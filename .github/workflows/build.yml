name: Build

on:
  release:
    types: [created]        # runs automatically when you create a release on GitHub
  workflow_dispatch:        # also lets you trigger manually from Actions tab

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:mac
      - name: Upload Mac DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:win
      - name: Upload Windows EXE to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
